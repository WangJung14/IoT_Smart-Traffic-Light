services:
  mysql:
    image: mysql:8.0
    container_name: smarttraffic-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Root@123456
      MYSQL_DATABASE: SmartTrafficLightDb
      MYSQL_USER: smarttraffic
      MYSQL_PASSWORD: SmartTraffic@2026
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - smarttraffic-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRoot@123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
    driver: local

networks:
  smarttraffic-network:
    driver: bridge
